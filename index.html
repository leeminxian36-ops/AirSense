
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AirSense</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom right, #dfefff, #f5f7fa);
      margin: 0;
      padding: 30px;
      color: #333;
    }

    .container {
      max-width: 900px;
      margin: auto;
    }

    h1 {
      text-align: center;
      font-size: 48px;
      margin-bottom: 10px;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 40px;
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 20px;
      margin-bottom: 25px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
    }

    .status {
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      color: orange;
      margin-top: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }

    .reading-box {
      background: #f7f9fc;
      padding: 20px;
      border-radius: 15px;
      text-align: center;
    }

    .reading-box h3 {
      margin-bottom: 10px;
      color: #555;
    }

    .reading-value {
      font-size: 24px;
      font-weight: bold;
    }

    select,
    textarea,
    button {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      margin-top: 10px;
      font-size: 16px;
    }

    textarea {
      resize: vertical;
    }

    button {
      background-color: #4a90e2;
      color: white;
      border: none;
      cursor: pointer;
      transition: 0.3s;
      font-weight: bold;
    }

    button:hover {
      background-color: #3578c9;
    }

    .warning {
      background: #fff3cd;
      color: #856404;
      padding: 15px;
      border-radius: 12px;
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>AirSense</h1>
    <p class="subtitle">
      Smart Portable Air Quality Detector for Sensitive Individuals
    </p>

    <div class="card">
      <h2>Current Air Quality</h2>

      <div class="status">
        🟠 Elevated Risk
      </div>

      <div class="grid">

        <div class="reading-box">
          <h3>Dust Level</h3>
          <div class="reading-value">Moderate</div>
        </div>

        <div class="reading-box">
          <h3>Humidity</h3>
          <div class="reading-value">82%</div>
        </div>

        <div class="reading-box">
          <h3>Temperature</h3>
          <div class="reading-value">29°C</div>
        </div>

        <div class="reading-box">
          <h3>Pressure</h3>
          <div class="reading-value">1012 hPa</div>
        </div>

      </div>

      <div class="warning">
        Avoid prolonged exposure in unfavorable environmental conditions.
      </div>
    </div>

    <div class="card">
      <h2>Sensitivity Level</h2>

      <select>
        <option>Mild</option>
        <option>Moderate</option>
        <option>Severe</option>
      </select>
    </div>

    <div class="card">
      <h2>Allergy Log</h2>

      <textarea rows="5" placeholder="Record symptoms or possible triggers..."></textarea>

      <button>Save Log</button>
    </div>

  </div>

</body>

</html>
