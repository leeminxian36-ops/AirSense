<!DOCTYPE html>
<html>

<head>
  <title>AirSense</title>
</head>

<body style="font-family: Arial; background-color: #f4f4f4; padding: 30px;">

  <h1>AirSense</h1>

  <div style="background:white; padding:20px; border-radius:10px; margin-bottom:20px;">
    <h2>Current Air Quality</h2>

    <p>Status: Elevated Risk</p>

    <p>Dust Level: Moderate</p>
    <p>Humidity: 82%</p>
    <p>Temperature: 29°C</p>
    <p>Pressure: 1012 hPa</p>
  </div>

  <div style="background:white; padding:20px; border-radius:10px; margin-bottom:20px;">
    <h2>Sensitivity Level</h2>

    <select>
      <option>Mild</option>
      <option>Moderate</option>
      <option>Severe</option>
    </select>
  </div>

  <div style="background:white; padding:20px; border-radius:10px;">
    <h2>Allergy Log</h2>

    <textarea rows="5" cols="40" placeholder="Record symptoms or triggers"></textarea>

    <br><br>

    <button>Save</button>
  </div>

</body>

</html>
